<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석부 (목자용)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* 제목 부분 디자인 수정: 세로 정렬(column)로 바꾸고 글자 크기 조정 */
        .header { display: flex; flex-direction: column; align-items: center; gap: 10px; border: 2px solid #333; padding: 10px; margin-bottom: 20px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; word-break: keep-all; } /* word-break: keep-all 로 단어 중간 줄바꿈 방지 */
        .date-input { font-size: 16px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; }
        
        /* 테이블 셀 간격 및 너비 조정 */
        table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; } /* table-layout: fixed 추가 */
        th, td { border: 1px solid #333; padding: 6px 2px; font-size: 12px; word-break: keep-all; } /* 폰트 크기 줄이고 단어 줄바꿈 방지 */
        th { background-color: #fff8e1; }
        
        /* 각 열(칸)의 너비를 비율로 고정 */
        th:nth-child(1) { width: 12%; } /* 마을 */
        th:nth-child(2) { width: 12%; } /* 직분 */
        th:nth-child(3) { width: 22%; } /* 이름 (가장 넓게) */
        th:nth-child(4), th:nth-child(5), th:nth-child(6), th:nth-child(7) { width: 10%; } /* 출석 체크 칸 */
        
        /* 마지막 관리 칸 너비 (sub.html에서는 이 줄이 무시됨) */
        th:nth-child(8) { width: 14%; } 
        
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 16px; user-select: none; }
        .check-cell:hover { background-color: #e3f2fd; }
        
        .admin-btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-img { background-color: #4CAF50; }
        .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 10px; }
        .btn-del { background-color: #ff9800; padding: 2px 6px; font-size: 11px; cursor: pointer; }
        .hide-on-print { display: table-cell; }
        .notice { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; word-break: keep-all; }
        
        /* 같은 마을끼리 묶어보이게 아랫줄 굵게 처리하는 코드 (자바스크립트에서 처리할 예정이므로 여기선 생략 가능) */
    </style>
</head>
<body>

<div class="container">
    <div class="notice">터치하면 출석이 체크되며, 모든 관리자에게 실시간 공유됩니다.</div>
    <div class="header">
        <div>출석부 입력창</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>마을</th><th>직분</th><th>이름</th>
                <th>수요</th><th>금요</th><th>주일</th><th>예배</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 완성된 파이어베이스 열쇠 코드
    const firebaseConfig = {
        apiKey: "AIzaSyAaKWXfo-m5gSkZWt9Y5msG_mdCOqurgDA",
        authDomain: "joshua-attendance-39be2.firebaseapp.com",
        projectId: "joshua-attendance-39be2",
        storageBucket: "joshua-attendance-39be2.firebasestorage.app",
        messagingSenderId: "300709168343",
        appId: "1:300709168343:4d662811b2282adb75c92",
        databaseURL: "https://joshua-attendance-39be2-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let members = [];
    let attendanceData = {};
    const dateInput = document.getElementById('currentDate');
    
    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    function init() {
        onValue(ref(db, 'members'), (snap) => {
            members = snap.val() || [];
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const dateStr = dateInput.value;
        onValue(ref(db, `attendance/${dateStr}`), (snap) => {
            attendanceData = snap.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        members.forEach((m, idx) => {
            if(!m) return;
            const checks = attendanceData[idx] || {};
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${m.village}</td><td>${m.role}</td><td>${m.name}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.toggleCheck = (idx, day) => {
        const dateStr = dateInput.value;
        const current = attendanceData[idx]?.[day] || false;
        set(ref(db, `attendance/${dateStr}/${idx}/${day}`), !current);
    };

    init();
</script>
</body>
</html>
