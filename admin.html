<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 여호수아 목장 출석부 (관리자)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪️</text></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #333; padding: 15px 5px; margin-bottom: 15px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; }
        .date-input { font-size: 18px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; }
        table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        th, td { border: 1px solid #333; padding: 8px 2px; font-size: 12px; }
        th { background-color: #fff8e1; word-break: keep-all; }
        th:nth-child(1) { width: 12%; } 
        th:nth-child(2) { width: 12%; } 
        th:nth-child(3) { width: 22%; } 
        th:nth-child(4), th:nth-child(5), th:nth-child(6), th:nth-child(7) { width: 10%; } 
        th:nth-child(8) { width: 14%; } 
        .count-cell { color: #d32f2f; font-weight: bold; font-size: 15px; background-color: #fff; }
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 16px; user-select: none; }
        .check-cell:hover { background-color: #e3f2fd; }
        .village-divider { border-bottom: 2px solid #000; }
        .admin-btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-img { background-color: #4CAF50; }
        .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; }
        .btn-del { background-color: #ff9800; padding: 4px 6px; font-size: 11px; cursor: pointer; }
        .hide-on-print { display: table-cell; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 10px;">
    <button class="admin-btn btn-img" id="imgBtn">🖼️ 이미지 저장</button>
    <button class="admin-btn btn-pdf" id="pdfBtn">📄 PDF 저장</button>
</div>

<div class="container" id="capture-area">
    <div class="header">
        <div class="header-title" id="mainTitle">2026년 여호수아 목장 출석부 (관리자)</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2">마을</th>
                <th rowspan="2">직분</th>
                <th rowspan="2">이름</th>
                <th class="count-cell" id="count-wed">0</th>
                <th class="count-cell" id="count-fri">0</th>
                <th class="count-cell" id="count-sun">0</th>
                <th class="count-cell" id="count-vil">0</th>
                <th rowspan="2" class="hide-on-print" id="action-header">관리</th>
            </tr>
            <tr>
                <th>수요</th><th>금요</th><th>주일</th><th>마을</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    <button class="admin-btn btn-add hide-on-print" id="addBtn">+ 새 인원 추가</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAaKWXfo-m5gSkZWt9Y5msG_mdCOqurgDA",
        authDomain: "joshua-attendance-39be2.firebaseapp.com",
        projectId: "joshua-attendance-39be2",
        storageBucket: "joshua-attendance-39be2.firebasestorage.app",
        messagingSenderId: "300709168343",
        appId: "1:300709168343:4d662811b2282adb75c92",
        databaseURL: "https://joshua-attendance-39be2-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let members = [];
    let attendanceData = {};
    const dateInput = document.getElementById('currentDate');
    
    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    const villageOrder = ['열매', '믿음', '소망', '축복', '온유', '만배', '생명수', '갈렙', '약속'];

    let audioCtx;
    function playSound(isCheck) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isCheck ? 880 : 440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(() => { osc.disconnect(); gain.disconnect(); }, 200);
        } catch(e) {}
    }

    function init() {
        onValue(ref(db, 'members'), (snap) => {
            let loadedMembers = snap.val() || [];
            loadedMembers = loadedMembers.filter(m => m !== null && m !== undefined);
            members = loadedMembers.sort((a, b) => {
                let aIndex = villageOrder.indexOf(a.village);
                let bIndex = villageOrder.indexOf(b.village);
                if (aIndex === -1) aIndex = 99;
                if (bIndex === -1) bIndex = 99;
                return aIndex - bIndex;
            });
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const dateStr = dateInput.value;
        onValue(ref(db, `attendance/${dateStr}`), (snap) => {
            attendanceData = snap.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let wedCount = 0, friCount = 0, sunCount = 0, vilCount = 0;

        members.forEach((m, idx) => {
            if(!m) return;
            const checks = attendanceData[idx] || {};
            if(checks.wed) wedCount++;
            if(checks.fri) friCount++;
            if(checks.sun) sunCount++;
            if(checks.vil) vilCount++;

            const tr = document.createElement('tr');
            const isLastInVillage = (idx === members.length - 1) || (members[idx+1].village !== m.village);
            if(isLastInVillage) tr.classList.add('village-divider');
            
            let displayName = m.name;
            if (displayName.includes('(') && !displayName.includes('<br>')) {
                displayName = displayName.replace('(', '<br>(');
            }
            
            tr.innerHTML = `
                <td>${m.village}</td><td>${m.role}</td><td>${displayName}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>
                <td class="hide-on-print"><button class="admin-btn btn-del" onclick="deleteMember(${idx})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
        
        document.getElementById('count-wed').innerText = wedCount;
        document.getElementById('count-fri').innerText = friCount;
        document.getElementById('count-sun').innerText = sunCount;
        document.getElementById('count-vil').innerText = vilCount;
    }

    window.toggleCheck = (idx, day) => {
        const dateStr = dateInput.value;
        const current = attendanceData[idx]?.[day] || false;
        const nextState = !current;
        set(ref(db, `attendance/${dateStr}/${idx}/${day}`), nextState);
        playSound(nextState);
    };

    window.deleteMember = (idx) => {
        const cleanName = members[idx].name.replace('<br>', '');
        if(confirm(`[${cleanName}] 성도님을 명단에서 삭제하시겠습니까?`)) {
            members.splice(idx, 1);
            const newMembers = members.filter(m => m !== null && m !== undefined);
            set(ref(db, 'members'), newMembers);
        }
    };

    document.getElementById('addBtn').addEventListener('click', () => {
        const v = prompt("마을 이름을 입력하세요 (예: 만배)");
        const r = prompt("직분을 입력하세요 (없으면 빈칸)");
        const n = prompt("이름을 입력하세요 (예: 홍길동(가족))");
        if(v && n) {
            members.push({ village: v, role: r, name: n });
            set(ref(db, 'members'), members);
        }
    });

    function hideAdminUI(hide) {
        const elems = document.querySelectorAll('.hide-on-print');
        elems.forEach(el => el.style.display = hide ? 'none' : '');
    }

    document.getElementById('imgBtn').addEventListener('click', () => {
        hideAdminUI(true);
        const titleEl = document.getElementById('mainTitle');
        titleEl.innerText = '2026년 여호수아 목장 출석부';
        html2canvas(document.getElementById('capture-area'), {scale: 2}).then(canvas => {
            const link = document.createElement('a');
            link.download = `출석부_${dateInput.value}.png`;
            link.href = canvas.toDataURL();
            link.click();
            hideAdminUI(false);
            titleEl.innerText = '2026년 여호수아 목장 출석부 (관리자)';
        });
    });

    document.getElementById('pdfBtn').addEventListener('click', () => {
        hideAdminUI(true);
        const titleEl = document.getElementById('mainTitle');
        titleEl.innerText = '2026년 여호수아 목장 출석부';
        html2canvas(document.getElementById('capture-area'), {scale: 2}).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
            const imgHeight = canvas.height * 210 / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 10, 210, imgHeight);
            pdf.save(`출석부_${dateInput.value}.pdf`);
            hideAdminUI(false);
            titleEl.innerText = '2026년 여호수아 목장 출석부 (관리자)';
        });
    });

    init();
</script>
</body>
</html>
