<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 여호수아 목장 출석부 (관리자)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%231976D2%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%231976D2%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 10px; background-color: #f4f4f9; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #333; padding: 15px 5px; margin-bottom: 10px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; }
        .date-input { font-size: 18px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; cursor: pointer; }
        .week-label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 15px; font-weight: bold; color: #d32f2f; font-size: 13px; background: #fff8e1; padding: 10px 2px; border: 1px solid #333; letter-spacing: -0.5px; }
        .summary-box span { color: #0044cc; margin: 0 2px; font-size: 14px; }

        .table-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .split-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        th, td { border: 1px solid #333; padding: 8px 2px; font-size: 12px; }
        th { background-color: #fff8e1; word-break: keep-all; }
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 16px; user-select: none; }
        .village-divider { border-bottom: 2px solid #000; }
        .admin-btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-img { background-color: #4CAF50; } .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; }
        .btn-del { background-color: #ff9800; padding: 4px 6px; font-size: 11px; cursor: pointer; color: white; border: none; border-radius: 3px; }

        /* 💡 이미지 저장 시 2단으로 배열하기 위한 특수 설정 */
        .export-mode { width: 850px !important; padding: 20px !important; }
        .export-mode .table-wrapper { flex-direction: row !important; align-items: flex-start !important; }
        .export-mode .split-table { width: 50% !important; }

        /* 모달 스타일 */
        #add-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; box-sizing: border-box; }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .modal-btns { display: flex; gap: 10px; } .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 10px;">
    <button class="admin-btn btn-img" id="imgBtn">🖼️ 이미지 저장</button>
    <button class="admin-btn btn-pdf" id="pdfBtn">📄 PDF 저장</button>
</div>

<div class="container" id="capture-area">
    <div class="header">
        <div class="header-title" id="mainTitle">2026년 여호수아 목장 출석부 (관리자)</div>
        <div class="week-label" id="weekRange">데이터 로딩 중...</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>

    <div class="summary-box">
        <div>수요:<span id="tot-wed">0</span></div><div>금요:<span id="tot-fri">0</span></div>
        <div>주일:<span id="tot-sun">0</span></div><div>마을:<span id="tot-vil">0</span></div>
    </div>

    <div class="table-wrapper">
        <table class="split-table">
            <thead><tr><th>마을</th><th>직분</th><th>이름</th><th>수요</th><th>금요</th><th>주일</th><th>마을</th><th class="hide-on-print">관리</th></tr></thead>
            <tbody id="tbody-left"></tbody>
        </table>
        <table class="split-table">
            <thead><tr><th>마을</th><th>직분</th><th>이름</th><th>수요</th><th>금요</th><th>주일</th><th>마을</th><th class="hide-on-print">관리</th></tr></thead>
            <tbody id="tbody-right"></tbody>
        </table>
    </div>
    <button class="admin-btn btn-add hide-on-print" id="addBtn">+ 새 인원 추가</button>
</div>

<div id="add-modal">
    <div class="modal-content">
        <h3>새 인원 등록</h3>
        <label>마을 선택</label>
        <select id="modal-village">
            <option value="열매">열매</option><option value="믿음">믿음</option><option value="소망">소망</option><option value="축복">축복</option><option value="온유">온유</option><option value="만배">만배</option><option value="생명수">생명수</option><option value="갈렙">갈렙</option><option value="약속">약속</option>
        </select>
        <input type="text" id="modal-role" placeholder="직분 (예: 목자)">
        <input type="text" id="modal-name" placeholder="성함 입력">
        <div class="modal-btns">
            <button style="background:#999; color:white;" id="modal-cancel">취소</button>
            <button style="background:#1976D2; color:white;" id="modal-save">저장</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAaKWXfo-m5gSkZWt9Y5msG_mdCOqurgDA",
        authDomain: "joshua-attendance-39be2.firebaseapp.com",
        projectId: "joshua-attendance-39be2",
        storageBucket: "joshua-attendance-39be2.firebasestorage.app",
        messagingSenderId: "300709168343",
        appId: "1:300709168343:4d662811b2282adb75c92",
        databaseURL: "https://joshua-attendance-39be2-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let members = []; let attendanceData = {};
    const dateInput = document.getElementById('currentDate');

    function getWeekKey(date) {
        const d = new Date(date); const day = d.getDay();
        const diff = (day >= 3) ? (day - 3) : (day + 4);
        d.setDate(d.getDate() - diff);
        return d.toISOString().split('T')[0];
    }

    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    const villageOrder = ['열매', '믿음', '소망', '축복', '온유', '만배', '생명수', '갈렙', '약속'];
    const leftVillages = ['열매', '믿음', '소망', '축복'];

    async function init() {
        onValue(ref(db, 'members'), (snap) => {
            members = (snap.val() || []).filter(m => m !== null).sort((a, b) => villageOrder.indexOf(a.village) - villageOrder.indexOf(b.village));
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const weekKey = getWeekKey(dateInput.value);
        onValue(ref(db, `attendance/${weekKey}`), (snap) => { attendanceData = snap.val() || {}; renderTable(); });
        document.getElementById('weekRange').innerText = `${weekKey} (수) 시작 주간`;
    }

    function renderTable() {
        const tLeft = document.getElementById('tbody-left'); const tRight = document.getElementById('tbody-right');
        tLeft.innerHTML = ''; tRight.innerHTML = '';
        let c = { wed: 0, fri: 0, sun: 0, vil: 0 };

        members.forEach((m, idx) => {
            const ch = attendanceData[idx] || {};
            if(ch.wed) c.wed++; if(ch.fri) c.fri++; if(ch.sun) c.sun++; if(ch.vil) c.vil++;
            const tr = document.createElement('tr');
            if(idx === members.length - 1 || members[idx+1].village !== m.village) tr.classList.add('village-divider');
            let dName = m.name.includes('(') ? m.name.replace('(', '<br>(') : m.name;
            tr.innerHTML = `<td>${m.village}</td><td>${m.role}</td><td>${dName}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${ch.wed?'O':''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${ch.fri?'O':''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${ch.sun?'O':''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${ch.vil?'O':''}</td><td class="hide-on-print"><button class="btn-del" onclick="deleteMember(${idx})">삭제</button></td>`;
            (leftVillages.includes(m.village) ? tLeft : tRight).appendChild(tr);
        });
        document.getElementById('tot-wed').innerText = c.wed; document.getElementById('tot-fri').innerText = c.fri; document.getElementById('tot-sun').innerText = c.sun; document.getElementById('tot-vil').innerText = c.vil;
    }

    window.toggleCheck = (idx, day) => {
        const weekKey = getWeekKey(dateInput.value);
        set(ref(db, `attendance/${weekKey}/${idx}/${day}`), !(attendanceData[idx]?.[day] || false));
    };

    // 📸 이미지 저장 로직 개선
    document.getElementById('imgBtn').addEventListener('click', () => {
        const area = document.getElementById('capture-area');
        area.classList.add('export-mode');
        document.querySelectorAll('.hide-on-print').forEach(el => el.style.display = 'none');

        // 💡 0.5초 대기 후 캡처 (명단이 많으므로 안정화 시간 부여)
        setTimeout(() => {
            html2canvas(area, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff",
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `여호수아_출석부_${getWeekKey(dateInput.value)}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                // 원상복구
                area.classList.remove('export-mode');
                document.querySelectorAll('.hide-on-print').forEach(el => el.style.display = '');
            }).catch(err => {
                alert("이미지 저장 중 오류가 발생했습니다. 크롬 브라우저 사용을 권장합니다.");
                console.error(err);
            });
        }, 500);
    });

    // PDF 저장 (기존과 동일)
    document.getElementById('pdfBtn').addEventListener('click', () => {
        const area = document.getElementById('capture-area');
        area.classList.add('export-mode');
        document.querySelectorAll('.hide-on-print').forEach(el => el.style.display = 'none');
        setTimeout(() => {
            html2canvas(area, {scale: 2}).then(canvas => {
                const pdf = new window.jspdf.jsPDF('l', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 10, 297, canvas.height * 297 / canvas.width);
                pdf.save(`여호수아_출석부_${getWeekKey(dateInput.value)}.pdf`);
                area.classList.remove('export-mode');
                document.querySelectorAll('.hide-on-print').forEach(el => el.style.display = '');
            });
        }, 500);
    });

    // 모달 로직
    const modal = document.getElementById('add-modal');
    document.getElementById('addBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('modal-cancel').onclick = () => modal.style.display = 'none';
    document.getElementById('modal-save').onclick = () => {
        const v = document.getElementById('modal-village').value, r = document.getElementById('modal-role').value, n = document.getElementById('modal-name').value;
        if(n) { members.push({ village:v, role:r, name:n }); set(ref(db, 'members'), members); modal.style.display = 'none'; }
    };

    init();
</script>
</body>
</html>
