<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 여호수아 목장 출석부 (관리자)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%231976D2%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%231976D2%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #333; padding: 15px 5px; margin-bottom: 10px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; }
        .date-input { font-size: 18px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; cursor: pointer; }
        
        .week-label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }

        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 15px; font-weight: bold; color: #d32f2f; font-size: 13px; background: #fff8e1; padding: 10px 2px; border: 1px solid #333; letter-spacing: -0.5px; }
        .summary-box div { white-space: nowrap; }
        .summary-box span { color: #0044cc; margin: 0 2px; font-size: 14px; }

        .table-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .split-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        
        th, td { border: 1px solid #333; padding: 8px 2px; font-size: 12px; }
        th { background-color: #fff8e1; word-break: keep-all; }
        th:nth-child(1), th:nth-child(2) { width: 12%; } 
        th:nth-child(3) { width: 22%; } 
        th:nth-child(4), th:nth-child(5), th:nth-child(6), th:nth-child(7) { width: 10%; } 
        th:nth-child(8) { width: 14%; } 
        
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 16px; user-select: none; }
        .check-cell:hover { background-color: #e3f2fd; }
        .village-divider { border-bottom: 2px solid #000; }
        .admin-btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-img { background-color: #4CAF50; }
        .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; }
        .btn-del { background-color: #ff9800; padding: 4px 6px; font-size: 11px; cursor: pointer; }
        .hide-on-print { display: table-cell; }

        .export-mode { width: 850px !important; max-width: none !important; padding: 20px !important; }
        .export-mode .table-wrapper { flex-direction: row; align-items: flex-start; }
        .export-mode .split-table { width: 50%; }
        .export-mode th, .export-mode td { padding: 4px 1px !important; font-size: 11px !important; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 10px;">
    <button class="admin-btn btn-img" id="imgBtn">🖼️ 이미지 저장</button>
    <button class="admin-btn btn-pdf" id="pdfBtn">📄 PDF 저장</button>
</div>

<div class="container" id="capture-area">
    <div class="header">
        <div class="header-title" id="mainTitle">2026년 여호수아 목장 출석부 (관리자)</div>
        <div class="week-label" id="weekRange">수요일 ~ 일요일 주간 데이터</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>

    <div class="summary-box">
        <div>수요:<span id="tot-wed">0</span></div>
        <div>금요:<span id="tot-fri">0</span></div>
        <div>주일:<span id="tot-sun">0</span></div>
        <div>마을:<span id="tot-vil">0</span></div>
    </div>

    <div class="table-wrapper" id="table-wrapper">
        <table class="split-table">
            <thead>
                <tr>
                    <th>마을</th><th>직분</th><th>이름</th><th>수요</th><th>금요</th><th>주일</th><th>마을</th><th class="hide-on-print action-col">관리</th>
                </tr>
            </thead>
            <tbody id="tbody-left"></tbody>
        </table>

        <table class="split-table">
            <thead>
                <tr>
                    <th>마을</th><th>직분</th><th>이름</th><th>수요</th><th>금요</th><th>주일</th><th>마을</th><th class="hide-on-print action-col">관리</th>
                </tr>
            </thead>
            <tbody id="tbody-right"></tbody>
        </table>
    </div>
    
    <button class="admin-btn btn-add hide-on-print" id="addBtn">+ 새 인원 추가</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAaKWXfo-m5gSkZWt9Y5msG_mdCOqurgDA",
        authDomain: "joshua-attendance-39be2.firebaseapp.com",
        projectId: "joshua-attendance-39be2",
        storageBucket: "joshua-attendance-39be2.firebasestorage.app",
        messagingSenderId: "300709168343",
        appId: "1:300709168343:4d662811b2282adb75c92",
        databaseURL: "https://joshua-attendance-39be2-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let members = [];
    let attendanceData = {};
    const dateInput = document.getElementById('currentDate');
    
    // 💡 수요일 기준 주간 키 계산 함수
    function getWeekKey(date) {
        const d = new Date(date);
        const day = d.getDay(); // 0:일, 1:월, 2:화, 3:수, 4:목, 5:금, 6:토
        // 수요일(3)을 기준으로 며칠 전인지 계산
        const diff = (day >= 3) ? (day - 3) : (day + 4);
        d.setDate(d.getDate() - diff);
        
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const dayStr = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${dayStr}`;
    }

    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    const villageOrder = ['열매', '믿음', '소망', '축복', '온유', '만배', '생명수', '갈렙', '약속'];
    const leftVillages = ['열매', '믿음', '소망', '축복'];

    let audioCtx;
    function playSound(isCheck) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isCheck ? 880 : 440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(() => { osc.disconnect(); gain.disconnect(); }, 200);
        } catch(e) {}
    }

    function init() {
        onValue(ref(db, 'members'), (snap) => {
            let loadedMembers = snap.val() || [];
            members = loadedMembers.filter(m => m !== null).sort((a, b) => {
                let aIndex = villageOrder.indexOf(a.village);
                let bIndex = villageOrder.indexOf(b.village);
                return (aIndex === -1 ? 99 : aIndex) - (bIndex === -1 ? 99 : bIndex);
            });
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const weekKey = getWeekKey(dateInput.value);
        // 사용자에게 현재 어떤 주간의 데이터를 보는지 표시
        const startDay = new Date(weekKey);
        const endDay = new Date(startDay);
        endDay.setDate(endDay.getDate() + 4);
        document.getElementById('weekRange').innerText = `${startDay.getMonth()+1}/${startDay.getDate()}(수) ~ ${endDay.getMonth()+1}/${endDay.getDate()}(일) 주간 출석`;

        onValue(ref(db, `attendance/${weekKey}`), (snap) => {
            attendanceData = snap.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const tbodyLeft = document.getElementById('tbody-left');
        const tbodyRight = document.getElementById('tbody-right');
        tbodyLeft.innerHTML = ''; tbodyRight.innerHTML = '';
        let counts = { wed: 0, fri: 0, sun: 0, vil: 0 };

        members.forEach((m, idx) => {
            const checks = attendanceData[idx] || {};
            if(checks.wed) counts.wed++;
            if(checks.fri) counts.fri++;
            if(checks.sun) counts.sun++;
            if(checks.vil) counts.vil++;

            const tr = document.createElement('tr');
            const isLast = (idx === members.length - 1) || (members[idx+1].village !== m.village);
            if(isLast) tr.classList.add('village-divider');
            
            let dName = m.name.includes('(') ? m.name.replace('(', '<br>(') : m.name;
            tr.innerHTML = `
                <td>${m.village}</td><td>${m.role}</td><td>${dName}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>
                <td class="hide-on-print"><button class="admin-btn btn-del" onclick="deleteMember(${idx})">삭제</button></td>
            `;
            (leftVillages.includes(m.village) ? tbodyLeft : tbodyRight).appendChild(tr);
        });
        
        document.getElementById('tot-wed').innerText = counts.wed;
        document.getElementById('tot-fri').innerText = counts.fri;
        document.getElementById('tot-sun').innerText = counts.sun;
        document.getElementById('tot-vil').innerText = counts.vil;
    }

    window.toggleCheck = (idx, day) => {
        const weekKey = getWeekKey(dateInput.value);
        const current = attendanceData[idx]?.[day] || false;
        const nextState = !current;
        set(ref(db, `attendance/${weekKey}/${idx}/${day}`), nextState);
        playSound(nextState);
    };

    window.deleteMember = (idx) => {
        if(confirm(`삭제하시겠습니까?`)) {
            members.splice(idx, 1);
            set(ref(db, 'members'), members);
        }
    };

    document.getElementById('addBtn').addEventListener('click', () => {
        const v = prompt("마을"); const r = prompt("직분"); const n = prompt("이름");
        if(v && n) {
            members.push({ village: v, role: r, name: n });
            set(ref(db, 'members'), members);
        }
    });

    document.getElementById('imgBtn').addEventListener('click', () => {
        const area = document.getElementById('capture-area');
        area.classList.add('export-mode');
        document.querySelectorAll('.hide-on-print').forEach(el => el.style.display = 'none');
        setTimeout(() => {
            html2canvas(area, {scale: 2}).then(canvas => {
                const link = document.createElement('a');
                link.download = `여호수아_출석부_${getWeekKey(dateInput.value)}.png`;
                link.href = canvas.toDataURL();
                link.click();
                area.classList.remove('export-mode');
                document.querySelectorAll('.hide-on-print').forEach(el => el.style.display = '');
            });
        }, 200);
    });

    init();
</script>
</body>
</html>
